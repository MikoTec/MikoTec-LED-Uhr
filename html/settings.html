<!DOCTYPE HTML>
<html>
<head>
<title>Einstell.</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/menu.css">
</head>
<body class="settings-page">
<div id="menu-placeholder"></div>
<div style="font-size:32px;font-weight:bold;letter-spacing:2px;margin-bottom:10px;font-family:Abel,sans-serif">
<span id="esptime" onclick="window.location='/game'" style="cursor:pointer">--:--:--</span>
</div>
<div style="margin-bottom:20px">
<input type="date" id="mandate" style="font-size:18px;padding:8px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);margin-right:6px">
<input type="time" id="mantime" step="1" style="font-size:18px;padding:8px;border-radius:3px;border:1px solid rgba(0,0,0,0.15);margin-right:6px">
<button type="button" onclick="setManualTime()" style="font-size:14px;padding:9px 15px;background:#111;color:#fff;border:0;border-radius:3px;cursor:pointer;font-family:Abel,sans-serif;text-transform:uppercase;letter-spacing:1px">Zeit &amp; Datum setzen</button>
</div>
<form class="form-verticle" action="/settings" method="POST">
<ul>
<li>
<label>Std-Marken:</label>
<div class="form-field">
<select name="hourmarks" id="hourmarks">
<option value="0">Keine</option>
<option value="1">Mittag</option>
<option value="2">Quadranten</option>
<option value="3">Stunden</option>
<option value="4">Abdunkeln</option>
</select>
</div>
</li>
<li class="checkbox">
<input id="showsecondshidden" type="hidden" name="showsecondshidden" value="0">
<input id="showseconds" type="checkbox" name="showseconds">
<label for="showseconds">Sekunden</label>
</li>
<li class="checkbox">
<input id="showsunpointhidden" type="hidden" name="showsunpointhidden" value="0">
<input id="showsunpoint" type="checkbox" name="showsunpoint">
<label for="showsunpoint"><span data-tooltip="Zeigt die aktuelle Sonnenposition als goldenen LED-Punkt" class="tooltip">Sonnenpunkt</span></label>
</li>
<li class="checkbox">
<input id="dawnbreakhidden" type="hidden" name="dawnbreakhidden" value="0">
<input id="dawnbreak" type="checkbox" name="dawnbreak">
<label for="dawnbreak"><span data-tooltip="Simuliere den Sonnenaufgang eine Std. vor Einschalten der vollen Tagesuhrzeit" class="tooltip">Sonnenaufgang</span></label>
</li>

<label data-tooltip="Nachts nur LED Punkte anzeigen" class="tooltip section-head">Schlaf:</label>

<li id="rcorners2">
<label>Schlaf-Typ</label>
<div class="form-field">
<select name="sleeptype" id="sleeptype">
<option value="0">Schwarz</option>
<option value="1">Punkte</option>
<option value="2">Gedimmt</option>
<option value="3">Mondphase</option>
<option value="4">Aus</option>
</select>
</div>
<label data-tooltip="Helligkeit der Uhr im Schlafmodus (0=komplett aus, 100=volle Helligkeit)" class="tooltip">Nacht-Helligkeit</label>
<div class="form-field">
<input type="range" name="nightbrightness" id="nightbrightness" min="0" max="100" value="10">
<span id="nbval">10%</span>
</div>
<label data-tooltip="Manuell: Feste Zeiten. Automatisch: Sonnenauf-/untergang" class="tooltip">Schlafsteuerung</label>
<div class="form-field">
<select name="autosleep" id="autosleep" onchange="toggleSleepFields()">
<option value="0">Manuell</option>
<option value="1">Automatisch (Sonne)</option>
</select>
</div>
<div id="manualsleep">
<label>Von</label>
<div class="form-field">
<input type="time" name="sleep" id="sleep" value="22:00">
</div>
<label>Bis</label>
<div class="form-field">
<input type="time" name="wake" id="wake" value="07:00">
</div>
</div>
</li>

<li>
<label>Hemisphäre</label>
<div class="form-field">
<select name="hemisphere" id="hemisphere">
<option value="0">Nordhalbkugel</option>
<option value="1">Südhalbkugel</option>
</select>
</div>
</li>
<li>
<label>Zeitzone</label>
<div class="form-field">
<select name="timezone" id="timezone">
<option value="1">(GMT-12:00) Internationale Datumsgrenze West</option>
<option value="2">(GMT-11:00) Midwayinseln, Samoa</option>
<option value="3">(GMT-10:00) Hawaii</option>
<option value="4">(GMT-09:00) Alaska</option>
<option value="5">(GMT-08:00) Pazifische Zeit (US &amp; Kanada)</option>
<option value="6">(GMT-08:00) Tijuana, Baja California</option>
<option value="7">(GMT-07:00) Arizona</option>
<option value="8">(GMT-07:00) Chihuahua, La Paz, Mazatlan</option>
<option value="9">(GMT-07:00) Gebirgszeit (US &amp; Kanada)</option>
<option value="10">(GMT-06:00) Zentralamerika</option>
<option value="11">(GMT-06:00) Zentrale Zeit (US &amp; Kanada)</option>
<option value="12">(GMT-06:00) Guadalajara, Mexico City, Monterrey</option>
<option value="13">(GMT-06:00) Saskatchewan</option>
<option value="14">(GMT-05:00) Bogota, Lima, Quito, Rio Branco</option>
<option value="15">(GMT-05:00) Östliche Zeit (US &amp; Kanada)</option>
<option value="16">(GMT-05:00) Indiana (Ost)</option>
<option value="17">(GMT-04:00) Atlantische Zeit (Kanada)</option>
<option value="18">(GMT-04:00) Caracas, La Paz</option>
<option value="19">(GMT-04:00) Manaus</option>
<option value="20">(GMT-04:00) Santiago</option>
<option value="21">(GMT-03:30) Newfoundland</option>
<option value="22">(GMT-03:00) Brasilia</option>
<option value="23">(GMT-03:00) Buenos Aires, Georgetown</option>
<option value="24">(GMT-03:00) Greenland</option>
<option value="25">(GMT-03:00) Montevideo</option>
<option value="26">(GMT-02:00) Mittelatlantik</option>
<option value="27">(GMT-01:00) Kapverdische Inseln</option>
<option value="28">(GMT-01:00) Azores</option>
<option value="29">(GMT+00:00) Casablanca, Monrovia, Reykjavik</option>
<option value="30">(GMT+00:00) Greenwich: Dublin, Edinburgh, Lissabon, London</option>
<option value="31">(GMT+01:00) Amsterdam, Berlin, Bern, Rome, Stockholm, Vienna</option>
<option value="32">(GMT+01:00) Belgrade, Bratislava, Budapest, Ljubljana, Prague</option>
<option value="33">(GMT+01:00) Brussels, Copenhagen, Madrid, Paris</option>
<option value="34">(GMT+01:00) Sarajevo, Skopje, Warsaw, Zagreb</option>
<option value="35">(GMT+01:00) Westliches Zentralafrika</option>
<option value="36">(GMT+02:00) Amman</option>
<option value="37">(GMT+02:00) Athens, Bucharest, Istanbul</option>
<option value="38">(GMT+02:00) Beirut</option>
<option value="39">(GMT+02:00) Cairo</option>
<option value="40">(GMT+02:00) Harare, Pretoria</option>
<option value="41">(GMT+02:00) Helsinki, Kyiv, Riga, Sofia, Tallinn, Vilnius</option>
<option value="42">(GMT+02:00) Jerusalem</option>
<option value="43">(GMT+02:00) Minsk</option>
<option value="44">(GMT+02:00) Windhoek</option>
<option value="45">(GMT+03:00) Kuwait, Riyadh, Baghdad</option>

<option value="53">(GMT+04:30) Kabul</option>
<option value="54">(GMT+05:00) Yekaterinburg</option>
<option value="55">(GMT+05:00) Islamabad, Karachi, Tashkent</option>
<option value="56">(GMT+05:30) Sri Jayawardenapura</option>
<option value="57">(GMT+05:30) Chennai, Kolkata, Mumbai, New Delhi</option>
<option value="58">(GMT+05:45) Kathmandu</option>

<option value="60">(GMT+06:00) Astana, Dhaka</option>
<option value="61">(GMT+06:30) Yangon (Rangoon)</option>
<option value="62">(GMT+07:00) Bangkok, Hanoi, Jakarta</option>
<option value="63">(GMT+07:00) Krasnoyarsk</option>
<option value="64">(GMT+08:00) Beijing, Chongqing, Hong Kong, Urumqi</option>
<option value="65">(GMT+08:00) Kuala Lumpur, Singapore</option>
<option value="66">(GMT+08:00) Irkutsk, Ulaan Bataar</option>
<option value="67">(GMT+08:00) Perth</option>
<option value="68">(GMT+08:00) Taipei</option>
<option value="69">(GMT+09:00) Osaka, Sapporo, Tokyo</option>
<option value="70">(GMT+09:00) Seoul</option>
<option value="71">(GMT+09:00) Yakutsk</option>
<option value="72">(GMT+09:30) Adelaide</option>
<option value="73">(GMT+09:30) Darwin</option>
<option value="74">(GMT+10:00) Brisbane</option>
<option value="75">(GMT+10:00) Canberra, Melbourne, Sydney</option>
<option value="76">(GMT+10:00) Hobart</option>
<option value="77">(GMT+10:00) Guam, Port Moresby</option>
<option value="78">(GMT+10:00) Vladivostok</option>
<option value="79">(GMT+11:00) Magadan, Solomon Is., New Caledonia</option>
<option value="80">(GMT+12:00) Auckland, Wellington</option>
<option value="81">(GMT+12:00) Fiji, Kamchatka, Marshall Is.</option>
<option value="82">(GMT+13:00) Nuku'alofa</option>
</select>
</div>
</li>
<li class="checkbox">
<input id="DSThidden" type="hidden" name="DSThidden" value="0">
<input id="DST" type="checkbox" name="DST">
<label for="DST">Sommerzeit</label>
</li>
<li>
<label>Uhrentyp</label>
<div class="form-field">
<select name="clocktype" id="clocktype" onchange="CheckClockType(this.value)">
<option value="1">Original</option>
<option value="2">Mini</option>
<option value="3">Benutzerdefiniert</option>
</select>
</div>
</li>
<li id="pixelCountli" style="display:none">
<input name="pixelCount" id="pixelCount" type="number" value="60" min="1" max="255">
<label for="pixelCount">Anzahl LEDs</label>
</li>
<li id="powerTypeli" style="display:none">
<label>Strom</label>
<div class="form-field">
<select name="powerType" id="powerType">
<option value="1">Netzstrom</option>
<option value="2">USB-Strom</option>
</select>
</div>
</li>
<li class="form-field">
<input id="clockname" name="clockname" value="" type="text" autocorrect="off" autocapitalize="none">
<label data-tooltip="Netzwerkname der Uhr" class="tooltip section-head" for="clockname">Uhrenname</label>
</li>
<li class="checkbox">
<input id="betahidden" type="hidden" name="betahidden" value="0">
<input id="betachannel" type="checkbox" name="betachannel">
<label for="betachannel">Beta-Updates aktivieren</label>
</li>

<label class="hide-mobile">&nbsp;</label>
<div class="btn-box">
<input class="btn btn-default" type="submit" name="submit" value="Speichern"/>
</div>
</ul>
</form>

<div style="margin-top:30px;border-top:1px solid rgba(255,255,255,0.1);padding-top:20px">
<label class="section-head" style="font-size:18px;display:block;margin-bottom:15px">MQTT / Home Assistant</label>
<div id="mqttStatus" style="margin-bottom:10px;font-size:13px;color:#888"></div>
<ul class="form-verticle" style="list-style:none;padding:0">
<li class="checkbox">
<input id="mqtt_enabled" type="checkbox">
<label for="mqtt_enabled">MQTT aktivieren</label>
</li>
<li>
<input id="mqtt_broker" type="text" placeholder="z.B. 192.168.1.100" autocorrect="off" autocapitalize="none" style="width:100%;box-sizing:border-box">
<label for="mqtt_broker">Broker IP / Hostname</label>
</li>
<li>
<input id="mqtt_port" type="number" value="1883" min="1" max="65535" style="width:100%;box-sizing:border-box">
<label for="mqtt_port">Port</label>
</li>
<li>
<input id="mqtt_user" type="text" placeholder="(optional)" autocorrect="off" autocapitalize="none" style="width:100%;box-sizing:border-box">
<label for="mqtt_user">Benutzer</label>
</li>
<li>
<input id="mqtt_pass" type="password" placeholder="(optional)" style="width:100%;box-sizing:border-box">
<label for="mqtt_pass">Passwort</label>
</li>
<li>
<div class="btn-box">
<button type="button" class="btn btn-default" onclick="saveMqtt()">MQTT Speichern</button>
</div>
</li>
</ul>
</div>

<script src="/menu.js"></script>
<script src="/settings.js"></script>
</body>
</html>
