<!DOCTYPE HTML>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MikoTec LED Uhr</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/menu.css">
</head>
<body class="settings-page">
<div id="menu-placeholder"></div>

<div style="text-align:center;background:#fff;padding:10px 0 5px 0;position:relative;z-index:10;">
  <h1 style="margin:0;font-size:1.6em;color:#333;font-family:Abel,sans-serif;">MikoTec's LED Uhr</h1>
  <p style="margin:2px 0 0 0;font-size:0.9em;color:#888;">Version <span id="fw-version">--</span></p>
</div>

<div id="canvasholder">
  <canvas id="canvas"></canvas>
</div>

<form action="/" method="GET">
  <div class="color-section">
    <div class="color-box">
      <label>Stundenfarbe</label>
      <div id="hourcolor-swatch" style="width:44px;height:44px;border-radius:4px;border:1px solid #ccc;background:#ff0000;cursor:pointer;margin:auto;" onclick="document.getElementById('hourcolorspectrum').click()"></div>
      <input type="color" name="hourcolorspectrum" id="hourcolorspectrum" value="#ff0000" style="opacity:0;width:0;height:0;position:absolute;"/>
      <input type="hidden" name="hourcolor" id="hourcolor" value="#ff0000">
    </div>
    <div class="color-box">
      <label>Minutenfarbe</label>
      <div id="minutecolor-swatch" style="width:44px;height:44px;border-radius:4px;border:1px solid #ccc;background:#0000ff;cursor:pointer;margin:auto;" onclick="document.getElementById('minutecolorspectrum').click()"></div>
      <input type="color" name="minutecolorspectrum" id="minutecolorspectrum" value="#0000ff" style="opacity:0;width:0;height:0;position:absolute;"/>
      <input type="hidden" name="minutecolor" id="minutecolor" value="#0000ff"/>
    </div>
  </div>
  <div class="slide-section">
    <div class="point-slide">
      <label>Überblendeffekt <span id="bpval" style="color:#999;font-size:0.85em;"></span></label>
      <input type="range" id="blendpoint" name="blendpoint" min="0" max="255" value="128" oninput="document.getElementById('bpval').innerText=this.value">
    </div>
    <div class="point-slide">
      <label>Helligkeit <span id="brval" style="color:#999;font-size:0.85em;"></span></label>
      <input type="range" id="brightness" name="brightness" min="10" max="255" value="100" oninput="document.getElementById('brval').innerText=this.value">
    </div>
  </div>
  <script>
    document.getElementById('bpval').innerText=document.getElementById('blendpoint').value;
    document.getElementById('brval').innerText=document.getElementById('brightness').value;
  </script>
  <div class="btn-box scheme1" id="scheme-box-1" style="background:linear-gradient(to right,#ff0000,#0000ff);border-radius:6px;padding:4px;">
    <input class="btn btn-sm" type="submit" name="submit" value="Speichern V1" />
    <input class="btn btn-sm" type="submit" name="submit" value="Laden V1" />
  </div>
  <div class="btn-box scheme2" id="scheme-box-2" style="background:linear-gradient(to right,#ff0000,#0000ff);border-radius:6px;padding:4px;">
    <input class="btn btn-sm" type="submit" name="submit" value="Speichern V2" />
    <input class="btn btn-sm" type="submit" name="submit" value="Laden V2" />
  </div>
  <div class="btn-box scheme3" id="scheme-box-3" style="background:linear-gradient(to right,#ff0000,#0000ff);border-radius:6px;padding:4px;">
    <input class="btn btn-sm" type="submit" name="submit" value="Speichern V3" />
    <input class="btn btn-sm" type="submit" name="submit" value="Laden V3" />
  </div>
  <div class="btn-box scheme4" id="scheme-box-4" style="background:linear-gradient(to right,#ff0000,#0000ff);border-radius:6px;padding:4px;">
    <input class="btn btn-sm" type="submit" name="submit" value="Speichern V4" />
    <input class="btn btn-sm" type="submit" name="submit" value="Laden V4" />
  </div>
  <div class="btn-box" id="alarm-box"></div>
  <div class="btn-footer">
    <input class="btn btn-green" type="submit" name="submit" value="Update"/>
  </div>
</form>
<div class="bottomspacer"></div>

<script src="/colour.js"></script>
<script src="/clock.js"></script>
<script src="/menu.js"></script>
<script>
// Zustand von /getstate laden und Formular befüllen
fetch('/getstate').then(r=>r.json()).then(function(d){
  document.getElementById('fw-version').innerText = d.fw || '--';
  var hc = d.hourcolor || '#ff0000';
  var mc = d.minutecolor || '#0000ff';
  document.getElementById('hourcolor').value = hc;
  document.getElementById('hourcolorspectrum').value = hc;
  document.getElementById('hourcolor-swatch').style.background = hc;
  document.getElementById('minutecolor').value = mc;
  document.getElementById('minutecolorspectrum').value = mc;
  document.getElementById('minutecolor-swatch').style.background = mc;
  document.getElementById('blendpoint').value = d.blendpoint || 128;
  document.getElementById('bpval').innerText = d.blendpoint || 128;
  document.getElementById('brightness').value = d.brightness || 100;
  document.getElementById('brval').innerText = d.brightness || 100;
  document.getElementById('brightness').max = d.maxBrightness || 255;
  // Alarm-Box
  var alarmBox = document.getElementById('alarm-box');
  if(d.alarmactive){
    alarmBox.innerHTML = '<a class="btn btn-default" href="/?alarmoff=1">Cancel Alarm</a>';
  } else {
    alarmBox.innerHTML = '';
  }
  // Farbverlaeufe fuer Scheme-Buttons direkt setzen
  if(d.schemes){
    d.schemes.forEach(function(s,i){
      var box = document.getElementById('scheme-box-'+(i+1));
      if(box) box.style.background = 'linear-gradient(to right, '+s.h+' 0%, '+s.m+' 100%)';
    });
  }
});
// Farbwähler synchronisieren
document.getElementById('hourcolorspectrum').addEventListener('input',function(){
  document.getElementById('hourcolor').value=this.value;
  document.getElementById('hourcolor-swatch').style.background=this.value;
});
document.getElementById('minutecolorspectrum').addEventListener('input',function(){
  document.getElementById('minutecolor').value=this.value;
  document.getElementById('minutecolor-swatch').style.background=this.value;
});
</script>
</body>
</html>
