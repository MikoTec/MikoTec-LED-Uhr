<!DOCTYPE HTML>
<html>
<head>
<title>Einstellungen</title>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/menu.css">
</head>
<body class="settings-page">
<div id="menu-placeholder"></div>

<div style="font-size:32px;font-weight:bold;letter-spacing:2px;margin-bottom:10px;font-family:Abel,sans-serif;">
<span id="esptime" onclick="window.location='/game'" style="cursor:pointer">--:--:--</span>
</div>
<div style="margin-bottom:20px">
<span id="fwver" style="font-size:13px;color:#999;"></span>
</div>

<div id="rcorners2">
<label class="section-head">Einstellungen</label>
<form class="form-verticle" action="/settings" method="GET">
<ul>

<li>
<label>Uhrentyp</label>
<div class="form-field">
<select name="clocktype" id="clocktype" onchange="CheckClockType(this.value)">
<option value="0">Benutzerdefiniert</option>
<option value="1">Original (120 LEDs / Netz)</option>
<option value="2">Mini (60 LEDs / USB)</option>
</select>
</div>
</li>

<li id="pixelCountli">
<label>LED Anzahl</label>
<div class="form-field"><input type="number" name="pixelCount" id="pixelCount" min="1" max="255" value="60"></div>
</li>

<li id="powerTypeli">
<label>Stromversorgung</label>
<div class="form-field">
<select name="maxbright" id="maxbright">
<option value="100" id="maxbright100">USB (max. 100)</option>
<option value="255" id="maxbright255">Netz (max. 255)</option>
</select>
</div>
</li>

<li>
<label>Uhrenname (mDNS)</label>
<div class="form-field"><input type="text" name="clockname" id="clockname" maxlength="20" value=""></div>
</li>

<li>
<label>Std-Marken</label>
<div class="form-field">
<select name="hourmarks" id="hourmarks">
<option value="0">Keine</option>
<option value="1">Mittag</option>
<option value="2">Quadranten</option>
<option value="3">Stunden</option>
<option value="4">Abdunkeln</option>
</select>
</div>
</li>

<li>
<label>Sekunden anzeigen</label>
<div class="form-field">
<input type="hidden" name="showsecondshidden" value="1">
<input type="checkbox" name="showseconds" id="showseconds">
</div>
</li>

<li>
<label>Sonnenpunkt</label>
<div class="form-field">
<input type="hidden" name="showsunpointhidden" value="1">
<input type="checkbox" name="showsunpoint" id="showsunpoint">
</div>
</li>

<li>
<label>Sonnenaufgang</label>
<div class="form-field">
<input type="hidden" name="dawnbreakhidden" value="1">
<input type="checkbox" name="dawnbreak" id="dawnbreak">
</div>
</li>

<li>
<label>Schlaf-Typ</label>
<div class="form-field">
<select name="sleeptype" id="sleeptype">
<option value="0">Schwarz</option>
<option value="1">Punkte</option>
<option value="2">Gedimmt</option>
<option value="3">Mondphase</option>
<option value="4">Aus</option>
</select>
</div>
</li>

<li>
<label data-tooltip="Helligkeit der Uhr im Schlafmodus (0=aus, 100=voll)" class="tooltip">Nacht-Helligkeit</label>
<div class="form-field">
<input type="range" name="nightbrightness" id="nightbrightness" min="0" max="100" value="10">
<span id="nbval">10%</span>
</div>
</li>

<li>
<label>Schlafsteuerung</label>
<div class="form-field">
<select name="autosleep" id="autosleep" onchange="toggleSleepFields()">
<option value="0">Manuell</option>
<option value="1">Automatisch (Sonne)</option>
</select>
</div>
</li>

<div id="manualsleep">
<li>
<label>Schlafzeit Von</label>
<div class="form-field"><input type="time" name="sleep" id="sleep" value="22:00"></div>
</li>
<li>
<label>Schlafzeit Bis</label>
<div class="form-field"><input type="time" name="wake" id="wake" value="07:00"></div>
</li>
</div>

<li>
<label>Hemisphäre</label>
<div class="form-field">
<select name="hemisphere" id="hemisphere">
<option value="0">Nordhalbkugel</option>
<option value="1">Südhalbkugel</option>
</select>
</div>
</li>

<li>
<label>Sommerzeit</label>
<div class="form-field">
<select name="DSTauto" id="DSTauto">
<option value="1">Automatisch</option>
<option value="0">Manuell</option>
</select>
</div>
</li>

<label class="hide-mobile">&nbsp;</label>
<div class="btn-box">
<input class="btn btn-default" type="submit" name="submit" value="Speichern"/>
</div>
</ul>
</form>
</div>
<script src="/settings.js"></script>
</body>
</html>
